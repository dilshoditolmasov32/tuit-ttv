<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>TV Faculty WebAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, Helvetica, sans-serif;
      }

      .ar-note {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        z-index: 20;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(3, 7, 18, 0.72);
        color: #d8f8ff;
        border: 1px solid rgba(34, 211, 238, 0.35);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-align: center;
        backdrop-filter: blur(12px);
      }
    </style>
    <script>
      function reportStatus(value) {
        if (window.parent) {
          window.parent.postMessage(
            { source: "tv-tech-ar", type: "status", value: value },
            "*",
          );
        }
      }

      window.addEventListener("DOMContentLoaded", function () {
        var overlaySvg = encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="256" viewBox="0 0 512 256"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#818cf8"/></linearGradient></defs><rect width="512" height="256" rx="28" fill="#06131f"/><rect x="16" y="16" width="480" height="224" rx="22" fill="url(#g)" opacity="0.18"/><text x="36" y="92" fill="#d9f7ff" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">TV Faculty</text><text x="36" y="138" fill="#8fdfff" font-family="Arial, Helvetica, sans-serif" font-size="26">AR overlay preview</text><text x="36" y="184" fill="#c4fbff" font-family="Arial, Helvetica, sans-serif" font-size="20">Marker detected content panel</text></svg>',
        );

        var overlayEl = document.getElementById("facultyOverlay");
        var noteEl = document.getElementById("ar-note");
        overlayEl.setAttribute(
          "src",
          "data:image/svg+xml;charset=utf-8," + overlaySvg,
        );

        reportStatus("loading");

        AFRAME.registerComponent("marker-feedback", {
          init: function () {
            this.el.addEventListener("markerFound", function () {
              noteEl.textContent = "Marker detected. AR object is active.";
              reportStatus("marker-found");
            });

            this.el.addEventListener("markerLost", function () {
              noteEl.textContent = "Marker lost. Aim at the Hiro marker again.";
              reportStatus("marker-lost");
            });
          },
        });

        AFRAME.registerComponent("tap-pulse", {
          init: function () {
            var el = this.el;
            var enlarged = false;

            el.addEventListener("click", function () {
              enlarged = !enlarged;
              el.setAttribute(
                "animation__tap",
                "property: scale; to: " +
                  (enlarged ? "1.35 1.35 1.35" : "1 1 1") +
                  "; dur: 280; easing: easeInOutQuad",
              );
            });
          },
        });

        var sceneEl = document.querySelector("a-scene");
        sceneEl.addEventListener("loaded", function () {
          reportStatus("ready");
        });

        sceneEl.addEventListener("camera-init", function () {
          noteEl.textContent = "Camera ready. Point it at the Hiro marker.";
          reportStatus("ready");
        });

        sceneEl.addEventListener("camera-error", function () {
          noteEl.textContent = "Camera error. Check permissions and reload.";
          reportStatus("camera-error");
        });
      });
    </script>
  </head>
  <body>
    <div id="ar-note" class="ar-note">Opening camera and loading AR scene...</div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="antialias: true; alpha: true"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets>
        <img id="facultyOverlay" alt="faculty overlay" />
      </a-assets>

      <a-marker preset="hiro" marker-feedback>
        <a-entity position="0 0.2 0">
          <a-box
            position="0 0.7 0"
            depth="0.8"
            height="0.8"
            width="0.8"
            color="#22d3ee"
            material="metalness: 0.25; roughness: 0.3;"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"
            animation__float="property: position; dir: alternate; dur: 1800; loop: true; to: 0 0.95 0"
            tap-pulse
          ></a-box>

          <a-ring
            position="0 0.18 0"
            rotation="-90 0 0"
            radius-inner="0.95"
            radius-outer="1.15"
            color="#818cf8"
            animation="property: rotation; to: -90 0 360; loop: true; dur: 6000; easing: linear"
          ></a-ring>

          <a-text
            value="TV Faculty - AR View"
            position="0 1.85 0"
            align="center"
            color="#FFFFFF"
            width="4.8"
          ></a-text>

          <a-plane
            src="#facultyOverlay"
            position="0 1.1 -0.95"
            width="2.6"
            height="1.3"
            material="transparent: true"
          ></a-plane>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
